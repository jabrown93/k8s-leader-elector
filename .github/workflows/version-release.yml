name: Version release

on:
  push:
    branches: [ main, beta ]
  # Weekly roll-up of the fix(deps) commits that .releaserc.js suppresses on
  # push, promoted into a single patch release. GitHub only fires schedule
  # from the default branch, so this sweeps main only; use the manual trigger
  # below to sweep beta.
  schedule:
    - cron: '0 9 * * 1' # Mondays 09:00 UTC — weekly dependency roll-up
  # Also sets RELEASE_DEPS, so a manual run is an on-demand dependency sweep
  # (and the only way to promote beta's suppressed fix(deps) commits).
  workflow_dispatch: {}

# One version-release attempt per branch at a time.
concurrency:
  group: version-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    # Mint a short-lived (1h) installation token for the release GitHub App.
    # semantic-release pushes the version-bump commit + tag AS this app, and
    # main/beta's four rulesets (branch-integrity, require-pull-request,
    # require-status-checks, require-up-to-date) each grant that app an
    # `always` bypass, so its unsigned, unreviewed, unchecked release commit
    # lands on the protected branch while contributors stay gated. APP_ID and
    # APP_PRIVATE_KEY are synced into this repo's Actions secrets from OpenBao
    # (secret/ci/release-app/app) by the homelab github-sync PushSecret, so the
    # credential is rotated in one place and never pasted by hand.
    #
    # client-id, not app-id: create-github-app-token v3 deprecated app-id in
    # favor of client-id. Both accept the same App ID / Client ID value and
    # resolve identically internally, so APP_ID is the correct input here.
    - name: Generate app token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}

    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        # Persist the app token as the origin credential: the beta resync step
        # below pushes with it. This is checkout's default, but the resync
        # depends on it, so it is set explicitly rather than left implicit.
        persist-credentials: true
        token: ${{ steps.app-token.outputs.token }}

    # Captured as early as possible, before the slow steps below (npm ci,
    # semantic-release's own GitHub API calls) run, so the later
    # --force-with-lease reflects beta's tip as of "job start", not "right
    # before we push" - the whole job takes long enough for a concurrent
    # beta merge to land and be missed by a lease captured any later.
    - name: Capture beta tip before release
      if: github.ref_name == 'main'
      id: beta_before
      run: echo "sha=$(git ls-remote origin refs/heads/beta | cut -f1)" >> "$GITHUB_OUTPUT"

    - name: Set up Node
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: 24
        cache: npm

    - name: Install release tooling
      run: npm ci

    - name: Set up JDK 25
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        distribution: corretto
        java-version: '25'
        cache: maven

    # semantic-release analyzes commits since the last release tag on this
    # branch, and only publishes (tags, bumps pom.xml, updates CHANGELOG.md,
    # creates the GitHub Release) when a feat/fix/breaking commit warrants a
    # release. A published tag push is what triggers the separate
    # release.yml workflow to build/push/sign the Docker image — decoupled
    # so an image-build failure can be retried (re-running failed jobs on
    # the tag push) without semantic-release re-evaluating whether there's
    # anything new to release. Authenticated with the app token (not the
    # default GITHUB_TOKEN) because the app carries this repo's
    # release-automation bypass on the main/beta rulesets, needed to push the
    # release commit + tag directly to the protected branch.
    - name: Run semantic-release
      id: release
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        # Read by .releaserc.js to promote the fix(deps) commits it suppresses
        # on push into a single patch release. Set on the weekly schedule, and
        # on workflow_dispatch so a manual run is an on-demand sweep (the only
        # way to reach beta, which schedule cannot trigger). This repo sets the
        # var itself rather than inheriting it from jabrown93/.github's
        # npm-release.yml/docker-release.yml, since it runs semantic-release
        # directly. Keep the expression in sync with those workflows.
        RELEASE_DEPS: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
      run: npx semantic-release

    # A squash merge of main -> beta does NOT make main's commits (or their
    # tags) ancestors of beta, so semantic-release can't see a stable
    # release as beta's baseline via a squash-merged resync PR - it would
    # keep computing beta's next prerelease from the old, now-superseded
    # prerelease baseline. Resetting beta to main's exact tip is the only
    # ancestry-correct fix. --force-with-lease is pinned to the SHA captured
    # in "Capture beta tip before release", at the start of this job - not
    # re-fetched here - so a beta merge landing anywhere during this job's
    # run (checkout, npm ci, the semantic-release run itself) aborts the
    # push instead of being silently discarded. actions/checkout persisted the
    # app token as the origin credential above, so this push (to a different
    # ref than was checked out) reuses it without needing to set it again
    # here - and the app's bypass covers refs/heads/beta too, which the
    # ruleset protects alongside main.
    - name: Resync beta to main after a stable release
      if: steps.release.outputs.published == 'true' && github.ref_name == 'main'
      run: |
        git push origin "HEAD:refs/heads/beta" --force-with-lease="refs/heads/beta:${{ steps.beta_before.outputs.sha }}"
