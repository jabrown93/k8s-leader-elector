name: Release

on:
  push:
    tags:
    - 'v*.*.*'

jobs:
  release-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up JDK 25
      uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        distribution: corretto
        java-version: '25'
        cache: maven

    - name: Build artifacts (thin jar + libs)
      run: mvn -B -DskipTests clean package

    - name: Set up QEMU
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      with:
        platforms: linux/amd64,linux/arm64

    - name: Set up Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Login to GHCR
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to Docker Hardened Images
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: dhi.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    # main -> stable tag (no `-`): version + floating `latest`. beta ->
    # prerelease tag (e.g. v1.2.0-beta.1): version + floating `beta`.
    # `latest` only ever moves on a stable release.
    - name: Extract tag and compute image tags
      id: vars
      env:
        IMAGE: ghcr.io/${{ github.repository_owner }}/k8s-leader-elector
      run: |
        VERSION="${GITHUB_REF#refs/tags/}"
        echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
        FLOATING="latest"
        if [[ "${VERSION}" == *-* ]]; then
          FLOATING="beta"
        fi
        {
          echo "tags<<EOF"
          echo "${IMAGE}:${VERSION}"
          echo "${IMAGE}:${FLOATING}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Run maven install
      run: mvn clean install

    - name: Build and push Docker image
      id: image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        file: ./Dockerfile
        push: true
        # Attach a CycloneDX SBOM + max provenance as OCI referrers on the image
        # (inspect: `docker buildx imagetools inspect --format '{{json .SBOM}}' <img>`).
        provenance: mode=max
        sbom: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.vars.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      with:
        # Pin the cosign binary (not just the installer) so signature/bundle
        # format stays stable and Kyverno verification is reproducible.
        cosign-release: 'v3.1.1'

    # Keyless (Fulcio/rekor) signature over the pushed digest so the homelab
    # Kyverno verify-ghcr-images policy can verify this image.
    - name: Sign image (keyless)
      env:
        DIGEST: ${{ steps.image.outputs.digest }}
      run: |
        if [ -z "${DIGEST}" ]; then
          echo "::error::build-push-action produced no digest; cannot sign image" >&2
          exit 1
        fi
        cosign sign --yes "ghcr.io/${{ github.repository_owner }}/k8s-leader-elector@${DIGEST}"
