name: Release

on:
  push:
    branches: [ main, beta ]

# One release attempt per branch at a time; never cancel a release mid-publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        token: ${{ secrets.GH_TOKEN }}

    - name: Set up Node
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: 22
        cache: npm

    - name: Install release tooling
      run: npm ci

    - name: Set up JDK 25
      uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        distribution: corretto
        java-version: '25'
        cache: maven

    # semantic-release analyzes commits since the last release tag on this
    # branch, and only publishes (tags, bumps pom.xml, updates CHANGELOG.md,
    # creates the GitHub Release) when a feat/fix/breaking commit warrants a
    # release. Authenticated with GH_TOKEN (not the default GITHUB_TOKEN used
    # below for GHCR) because it carries this repo's release-automation
    # bypass on the main/beta rulesets, needed to push the release commit +
    # tag directly to the protected branch.
    - name: Run semantic-release
      id: release
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: npx semantic-release

    - name: Build artifacts (thin jar + libs)
      if: steps.release.outputs.published == 'true'
      run: mvn -B -DskipTests clean package

    - name: Set up QEMU
      if: steps.release.outputs.published == 'true'
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      with:
        platforms: linux/amd64,linux/arm64

    - name: Set up Buildx
      if: steps.release.outputs.published == 'true'
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Login to GHCR
      if: steps.release.outputs.published == 'true'
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to Docker Hardened Images
      if: steps.release.outputs.published == 'true'
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: dhi.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    # main -> stable: version + floating `latest`. beta -> prerelease:
    # version + floating `beta`. `latest` only ever moves on a main release.
    - name: Compute image tags
      if: steps.release.outputs.published == 'true'
      id: tags
      env:
        VERSION: ${{ steps.release.outputs.version }}
        CHANNEL: ${{ steps.release.outputs.channel }}
        IMAGE: ghcr.io/${{ github.repository_owner }}/k8s-leader-elector
      run: |
        FLOATING="latest"
        if [ "${CHANNEL}" = "beta" ]; then
          FLOATING="beta"
        fi
        {
          echo "tags<<EOF"
          echo "${IMAGE}:${VERSION}"
          echo "${IMAGE}:${FLOATING}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Build and push Docker image
      if: steps.release.outputs.published == 'true'
      id: image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        file: ./Dockerfile
        push: true
        # Attach a CycloneDX SBOM + max provenance as OCI referrers on the image
        # (inspect: `docker buildx imagetools inspect --format '{{json .SBOM}}' <img>`).
        provenance: mode=max
        sbom: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.tags.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Install cosign
      if: steps.release.outputs.published == 'true'
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      with:
        # Pin the cosign binary (not just the installer) so signature/bundle
        # format stays stable and Kyverno verification is reproducible.
        cosign-release: 'v3.1.1'

    # Keyless (Fulcio/rekor) signature over the pushed digest so the homelab
    # Kyverno verify-ghcr-images policy can verify this image.
    - name: Sign image (keyless)
      if: steps.release.outputs.published == 'true'
      env:
        DIGEST: ${{ steps.image.outputs.digest }}
      run: |
        if [ -z "${DIGEST}" ]; then
          echo "::error::build-push-action produced no digest; cannot sign image" >&2
          exit 1
        fi
        cosign sign --yes "ghcr.io/${{ github.repository_owner }}/k8s-leader-elector@${DIGEST}"
