---
name: 'CodeQL Advanced'
on:
  push:
    branches: ['main', 'beta']
  pull_request:
    branches: ['main', 'beta']
  schedule:
    - cron: '25 22 * * 5'
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: jabrown93/ci/actions/codeql@63fdb1321ea7e94b330b23d87a9c9961ed6b86b5 # codeql-v1.0.0
        with:
          language: java-kotlin
          build-mode: autobuild
