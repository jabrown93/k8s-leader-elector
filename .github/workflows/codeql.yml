---
name: 'CodeQL Advanced'
on:
  push:
    branches: ['main', 'beta']
  pull_request:
    branches: ['main', 'beta']
  schedule:
    - cron: '25 22 * * 5'
jobs:
  analyze:
    uses: jabrown93/.github/.github/workflows/codeql.yml@646fa5ec406b9d4ee20498512d6748135f4a6206 # v1.1.0
    with:
      language: java-kotlin
      build-mode: autobuild
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
