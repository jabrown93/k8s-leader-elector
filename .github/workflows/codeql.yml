---
name: 'CodeQL Advanced'
on:
  push:
    branches: ['main', 'beta']
  pull_request:
    branches: ['main', 'beta']
  schedule:
    - cron: '25 22 * * 5'
jobs:
  analyze:
    uses: jabrown93/.github/.github/workflows/codeql.yml@71c3af9fc09ce87b086cc058773380acaf2b1299 # v1.2.0
    with:
      language: java-kotlin
      build-mode: autobuild
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
