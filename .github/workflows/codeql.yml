---
name: 'CodeQL Advanced'
on:
  push:
    branches: ['main', 'beta']
  pull_request:
    branches: ['main', 'beta']
  schedule:
    - cron: '25 22 * * 5'
jobs:
  analyze:
    uses: jabrown93/.github/.github/workflows/codeql.yml@644b89511f2e5143fb600246050eaf3aa5f532eb # v1.5.0
    with:
      language: java-kotlin
      build-mode: autobuild
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
