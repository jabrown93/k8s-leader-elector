name: CI
on:
  pull_request:
    branches: [ main, beta ]
  push:
    # main/beta = post-merge run, including the semantic-release bot's own
    # release commit (which carries [skip ci] so this doesn't loop). renovate/**
    # lets Renovate's branch-automerge updates (which never open a PR) run
    # `test` on the branch, so the default-branch ruleset (required `test`
    # check, pull_request rule dropped) can fast-forward main once the branch
    # is green.
    branches: [ main, beta, 'renovate/**' ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - name: Set up JDK 25
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        distribution: corretto
        java-version: '25'
        cache: maven

    - name: Build with Maven
      run: mvn -B verify
