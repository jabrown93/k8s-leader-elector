name: CI
on:
  pull_request:
    branches: [ main, beta ]
  push:
    # main/beta = post-merge run, including the semantic-release bot's own
    # release commit (which carries [skip ci] so this doesn't loop). renovate/**
    # lets Renovate's branch-automerge updates (which never open a PR) run
    # `test` on the branch, so the default-branch ruleset (required `test`
    # check, pull_request rule dropped) can fast-forward main once the branch
    # is green.
    branches: [ main, beta, 'renovate/**' ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up JDK 25
      uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        distribution: corretto
        java-version: '25'
        cache: maven

    - name: Build with Maven
      run: mvn -B verify
